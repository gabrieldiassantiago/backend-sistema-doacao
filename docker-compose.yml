version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: doacao_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: doacao
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - doacao_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doacao"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doacao_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/doacao
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - doacao_network
    volumes:
      - ./prisma:/app/prisma
    command: sh -c "bunx prisma migrate deploy && bun run src/index.ts"

volumes:
  postgres_data:
    driver: local

networks:
  doacao_network:
    driver: bridge