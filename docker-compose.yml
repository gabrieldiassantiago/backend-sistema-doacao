version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: doacao_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: doacao
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - doacao_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d doacao"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  api:
    build: .
    container_name: doacao_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/doacao?sslmode=disable
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - doacao_network

volumes:
  postgres_data:

networks:
  doacao_network:
    driver: bridge